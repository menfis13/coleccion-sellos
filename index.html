<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo de Sellos</title>

<style>
body{
font-family:Arial;
margin:20px;
background:#f4f4f4;
}

#grid{
display:grid;
grid-template-columns:repeat(auto-fill,120px);
gap:10px;
}

.sello{
background:white;
border:1px solid #ccc;
padding:5px;
text-align:center;
cursor:pointer;
}

.sello img{
width:100px;
height:auto;
}

#editor{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border:2px solid #333;
display:none;
}

.photo{
width:200px;
border:1px solid #aaa;
margin:10px;
}
</style>
</head>

<body>

<h2>Catálogo de Sellos</h2>

<div id="grid"></div>

<div id="editor">
<h3 id="titulo"></h3>

<img id="imgFront" class="photo">
<input type="file" id="fileFront"><br>

<img id="imgBack" class="photo">
<input type="file" id="fileBack"><br><br>

<button onclick="closeEditor()">Cerrar</button>
</div>

<script>

const CLOUD =
"https://res.cloudinary.com/do4ltpfbo/image/upload/sellos/imagenes/";

const TOTAL_SELLOS = 500;

let current = null;

function pad(n){
return n.toString().padStart(3,'0');
}

function imgURL(n){
return CLOUD+"sello_"+pad(n)+".jpg";
}

function createGrid(){

const grid = document.getElementById("grid");

for(let i=1;i<=TOTAL_SELLOS;i++){

const div=document.createElement("div");
div.className="sello";

const img=document.createElement("img");

img.src=imgURL(i);

img.onerror=function(){
this.style.opacity=0.2;
};

div.appendChild(img);

div.onclick=function(){
openEditor(i);
};

grid.appendChild(div);

}

}

function openEditor(n){

current=n;

document.getElementById("titulo").innerText="Sello "+pad(n);

document.getElementById("imgFront").src=imgURL(n);

document.getElementById("imgBack").src=imgURL(n);

document.getElementById("editor").style.display="block";

}

function closeEditor(){
document.getElementById("editor").style.display="none";
}

createGrid();

</script>

</body>
</html>
