<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colección Filatélica de Menfis</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode {
            background-color: #1a1a1a;
            color: #e0e0e0;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header img {
            max-width: 100px;
            margin-bottom: 10px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-bar {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        body.dark-mode .search-bar {
            background: #333;
            border-color: #555;
            color: white;
        }

        .view-buttons {
            display: flex;
            gap: 5px;
        }

        .view-btn {
            padding: 10px 15px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            border-radius: 5px;
            font-size: 18px;
            transition: all 0.3s;
        }

        .view-btn:hover {
            background: #e0e0e0;
        }

        body.dark-mode .view-btn {
            background: #333;
            border-color: #555;
            color: white;
        }

        .view-btn.activo {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }

        /* =============================================
           ESTILOS PARA VISTA CUADRÍCULA (POR DEFECTO)
           ============================================= */
        .contenedor-sellos,
        .contenedor-pruebas,
        [class*="contenedor"],
        .tabla-sellos,
        .tabla-pruebas,
        table.stamps-table {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Tablas en vista cuadrícula */
        table.stamps-table {
            display: table;
            width: 100%;
        }

        table.stamps-table tr {
            display: table-row;
        }

        table.stamps-table td {
            display: table-cell;
        }

        /* =============================================
           ESTILOS PARA VISTA LISTA
           ============================================= */
        .contenedor-sellos.vista-lista,
        .contenedor-pruebas.vista-lista,
        [class*="contenedor"].vista-lista,
        .tabla-sellos.vista-lista,
        .tabla-pruebas.vista-lista {
            display: flex !important;
            flex-direction: column !important;
            gap: 10px !important;
        }

        /* Tablas en vista lista */
        table.stamps-table.vista-lista {
            display: table !important;
        }

        table.stamps-table.vista-lista tr {
            display: table-row !important;
        }

        /* Items individuales en vista lista */
        .contenedor-sellos.vista-lista .sello-item,
        .contenedor-pruebas.vista-lista .prueba-item,
        [class*="contenedor"].vista-lista .sello-item,
        [class*="contenedor"].vista-lista .prueba-item {
            width: 100% !important;
            display: flex !important;
            align-items: center !important;
            border-bottom: 1px solid #ccc !important;
            padding: 10px !important;
            flex-direction: row !important;
        }

        .sello-item, .prueba-item {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        body.dark-mode .sello-item,
        body.dark-mode .prueba-item {
            background: #2a2a2a;
            border-color: #444;
        }

        .sello-item img,
        .prueba-item img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        .contenedor-sellos.vista-lista .sello-item img,
        .contenedor-pruebas.vista-lista .prueba-item img {
            max-width: 100px !important;
            max-height: 100px !important;
            margin-right: 15px !important;
        }

        /* Navegación de épocas */
        .epoca-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .epoca-btn {
            padding: 10px 20px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .epoca-btn:hover {
            background: #007bff;
            color: white;
        }

        body.dark-mode .epoca-btn {
            background: #333;
            border-color: #555;
            color: white;
        }

        /* Modal y formularios */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        body.dark-mode .modal-content {
            background: #2a2a2a;
            color: #e0e0e0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        body.dark-mode .form-group input,
        body.dark-mode .form-group select,
        body.dark-mode .form-group textarea {
            background: #333;
            border-color: #555;
            color: white;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        /* Estado de conexión */
        .connection-status {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            text-align: center;
        }

        .connection-status.connecting {
            background: #fff3cd;
            color: #856404;
        }

        .connection-status.readonly {
            background: #f8d7da;
            color: #721c24;
        }

        .connection-status.connected {
            background: #d4edda;
            color: #155724;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .search-container {
                flex-direction: column;
            }

            .search-bar {
                width: 100%;
            }

            .contenedor-sellos,
            .contenedor-pruebas {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://res.cloudinary.com/do4ltpfbo/image/upload/v1774202113/corona.png" alt="Corona">
        <h1>🏛️ Colección Filatélica de Menfis</h1>
        <p>Sellos de España</p>
    </div>

    <!-- Estado de conexión con Google Sheets -->
    <div id="connection-status" class="connection-status connecting">
        🔒 Conectando con Google Sheets...
    </div>

    <!-- Navegación de épocas -->
    <div class="epoca-nav" id="epoca-nav">
        <button class="epoca-btn" data-epoca="todos">— Total —</button>
        <button class="epoca-btn" data-epoca="tengo">Tengo</button>
        <button class="epoca-btn" data-epoca="foto">Con foto</button>
        <button class="epoca-btn" data-epoca="epoca1">Época 1</button>
        <button class="epoca-btn" data-epoca="epoca2">Época 2</button>
        <button class="epoca-btn" data-epoca="pruebas">Pruebas Oficiales</button>
    </div>

    <!-- Barra de búsqueda y botones de vista -->
    <div class="search-container">
        <input type="text" class="search-bar" id="buscador" placeholder="🔍 Buscar sellos...">
        <div class="view-buttons">
            <button class="view-btn activo" id="btn-grid" title="Vista cuadrícula">⊞</button>
            <button class="view-btn" id="btn-list" title="Vista lista">☰</button>
        </div>
        <button class="view-btn" id="btn-darkmode" title="Modo oscuro">🌙</button>
        <button class="view-btn" id="btn-arriba" title="Ir arriba">↑ Arriba</button>
    </div>

    <!-- Contenedor principal de sellos -->
    <div class="contenedor-sellos" id="contenedor-sellos">
        <!-- Los sellos se cargarán dinámicamente desde Google Sheets -->
    </div>

    <!-- Contenedor de pruebas oficiales -->
    <div class="contenedor-pruebas" id="contenedor-pruebas" style="display: none;">
        <!-- Las pruebas se cargarán dinámicamente desde Google Sheets -->
    </div>

    <!-- Modal para editar sello -->
    <div class="modal" id="modal-sello">
        <div class="modal-content">
            <h2>Editar Sello</h2>
            <div class="form-group">
                <label>Nº Edifil</label>
                <input type="text" id="edifil">
            </div>
            <div class="form-group">
                <label>Año</label>
                <input type="text" id="anio">
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <input type="text" id="descripcion">
            </div>
            <div class="form-group">
                <label>Color</label>
                <input type="text" id="color">
            </div>
            <div class="form-group">
                <label>Valor Facial</label>
                <input type="text" id="valor">
            </div>
            <div class="form-group">
                <label>Dentado</label>
                <select id="dentado">
                    <option value="">-- Seleccionar --</option>
                    <option value="sin">Sin dentar</option>
                    <option value="14">Dentado 14</option>
                    <option value="11.5">Dentado 11½</option>
                    <option value="14x13.5">Dentado 14x13½</option>
                </select>
            </div>
            <div class="form-group">
                <label>Estado</label>
                <select id="estado">
                    <option value="">-- No tengo este sello --</option>
                    <option value="nuevo">Nuevo</option>
                    <option value="usado">Usado</option>
                    <option value="fijasello">Fijasello</option>
                </select>
            </div>
            <div class="form-group">
                <label>Notas personales</label>
                <textarea id="notas"></textarea>
            </div>
            <button class="btn btn-primary" id="guardar-sello">Guardar sello</button>
            <button class="btn btn-danger" id="eliminar-sello">🗑 Eliminar</button>
            <button class="btn btn-secondary" id="cancelar-sello">Cancelar</button>
        </div>
    </div>

    <!-- Modal para editar prueba -->
    <div class="modal" id="modal-prueba">
        <div class="modal-content">
            <h2>Editar Prueba</h2>
            <div class="form-group">
                <label>Nº Prueba</label>
                <input type="text" id="prueba-num">
            </div>
            <div class="form-group">
                <label>Año</label>
                <input type="text" id="prueba-anio">
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <input type="text" id="prueba-descripcion">
            </div>
            <div class="form-group">
                <label>Estado</label>
                <select id="prueba-estado">
                    <option value="">-- No tengo esta prueba --</option>
                    <option value="nuevo">Nuevo</option>
                    <option value="usado">Usado</option>
                    <option value="fijasello">Fijasello</option>
                </select>
            </div>
            <div class="form-group">
                <label>Notas personales</label>
                <textarea id="prueba-notas"></textarea>
            </div>
            <button class="btn btn-primary" id="guardar-prueba">Guardar prueba</button>
            <button class="btn btn-danger" id="eliminar-prueba">🗑 Eliminar</button>
            <button class="btn btn-secondary" id="cancelar-prueba">Cancelar</button>
        </div>
    </div>

    <!-- =============================================
         JAVASCRIPT - EL "CEREBRO" DE LA PÁGINA
         ============================================= -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // =============================================
            // 1. BOTONES DE VISTA (CUADRÍCULA / LISTA)
            // =============================================
            const btnGrid = document.getElementById('btn-grid');
            const btnList = document.getElementById('btn-list');
            
            // Busca TODOS los contenedores de la página
            const todosContenedores = document.querySelectorAll(
                '.contenedor-sellos, .contenedor-pruebas, [class*="contenedor"]'
            );

            // Función: Activar vista CUADRÍCULA
            function activarVistaGrid() {
                todosContenedores.forEach(cont => {
                    cont.classList.remove('vista-lista');
                });
                btnGrid.classList.add('activo');
                btnList.classList.remove('activo');
            }

            // Función: Activar vista LISTA
            function activarVistaLista() {
                todosContenedores.forEach(cont => {
                    cont.classList.add('vista-lista');
                });
                btnList.classList.add('activo');
                btnGrid.classList.remove('activo');
            }

            // Event listeners para los botones
            if (btnGrid) {
                btnGrid.addEventListener('click', activarVistaGrid);
            }

            if (btnList) {
                btnList.addEventListener('click', activarVistaLista);
            }

            // =============================================
            // 2. BUSCADOR
            // =============================================
            const buscador = document.getElementById('buscador');
            
            if (buscador) {
                buscador.addEventListener('input', function() {
                    const texto = this.value.toLowerCase();
                    
                    // Busca en todos los items (sellos y pruebas)
                    const todosItems = document.querySelectorAll('.sello-item, .prueba-item, tr');
                    
                    todosItems.forEach(item => {
                        const contenido = item.textContent.toLowerCase();
                        if (contenido.includes(texto)) {
                            item.style.display = '';
                        } else {
                            item.style.display = 'none';
                        }
                    });
                });
            }

            // =============================================
            // 3. MODO OSCURO
            // =============================================
            const btnDark = document.getElementById('btn-darkmode');
            
            if (btnDark) {
                btnDark.addEventListener('click', function() {
                    document.body.classList.toggle('dark-mode');
                });
            }

            // =============================================
            // 4. BOTÓN IR ARRIBA
            // =============================================
            const btnArriba = document.getElementById('btn-arriba');
            
            if (btnArriba) {
                btnArriba.addEventListener('click', function() {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }

            // =============================================
            // 5. NAVEGACIÓN DE ÉPOCAS
            // =============================================
            const epocaBtns = document.querySelectorAll('.epoca-btn');
            const contenedorSellos = document.getElementById('contenedor-sellos');
            const contenedorPruebas = document.getElementById('contenedor-pruebas');

            epocaBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const epoca = this.dataset.epoca;
                    
                    // Mostrar/ocultar contenedores según la época
                    if (epoca === 'pruebas') {
                        contenedorSellos.style.display = 'none';
                        contenedorPruebas.style.display = 'grid';
                    } else {
                        contenedorSellos.style.display = 'grid';
                        contenedorPruebas.style.display = 'none';
                    }

                    // Actualizar botón activo
                    epocaBtns.forEach(b => b.style.background = 'white');
                    this.style.background = '#007bff';
                    this.style.color = 'white';
                });
            });

            // =============================================
            // 6. MODALES (Editar sello/prueba)
            // =============================================
            const modalSello = document.getElementById('modal-sello');
            const modalPrueba = document.getElementById('modal-prueba');

            // Cerrar modales
            document.getElementById('cancelar-sello')?.addEventListener('click', () => {
                modalSello.style.display = 'none';
            });

            document.getElementById('cancelar-prueba')?.addEventListener('click', () => {
                modalPrueba.style.display = 'none';
            });

            // Cerrar al hacer clic fuera del modal
            window.addEventListener('click', function(event) {
                if (event.target === modalSello) {
                    modalSello.style.display = 'none';
                }
                if (event.target === modalPrueba) {
                    modalPrueba.style.display = 'none';
                }
            });

            // =============================================
            // 7. ESTADO DE CONEXIÓN GOOGLE SHEETS
            // =============================================
            const connectionStatus = document.getElementById('connection-status');
            
            // Simular estado de conexión (esto se actualizará con tu código real de Google Sheets)
            setTimeout(() => {
                if (connectionStatus) {
                    connectionStatus.className = 'connection-status readonly';
                    connectionStatus.innerHTML = '🔒 Modo solo lectura — inicia sesión con tu cuenta de Google para editar la colección';
                }
            }, 2000);

            // =============================================
            // 8. CARGA DE DATOS DESDE GOOGLE SHEETS
            // =============================================
            // Aquí iría tu código existente de conexión con Google Sheets
            // No lo he modificado para no romper tu integración existente
            
            console.log('✅ Página cargada correctamente');
            console.log('✅ Botones de vista funcionando para TODOS los contenedores');
        });
    </script>
</body>
</html>
