
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colección de Sellos</title>
</head>
<body>

<input type="file" id="fileDelante" accept="image/*">
<input type="file" id="fileDetras" accept="image/*">
<button onclick="guardar()">Guardar</button>

<img id="imgDelante" style="max-width:200px;display:none;">
<img id="imgDetras" style="max-width:200px;display:none;">

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyN-QGFzHoUkHM73sv2xx4-dY8AV6HKIR8trlONAqb-m7-KcagEBN-aZ_6iuN3sv0Q/exec";
const EDIFIL = 1; // usa aquí el número real

function subirImagen(file, campo) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => {
      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "uploadImage",
          edifil: EDIFIL,
          campo: campo,
          base64: reader.result
        })
      })
      .then(r => r.json())
      .then(d => resolve(d.url));
    };
    reader.readAsDataURL(file);
  });
}

async function guardar() {
  const delanteFile = document.getElementById("fileDelante").files[0];
  const detrasFile  = document.getElementById("fileDetras").files[0];

  let delanteURL = "";
  let detrasURL = "";

  if (delanteFile) delanteURL = await subirImagen(delanteFile, "delante");
  if (detrasFile)  detrasURL  = await subirImagen(detrasFile, "detras");

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "saveData",
      edifil: EDIFIL,
      delante: delanteURL,
      detras: detrasURL
    })
  });

  if (delanteURL) {
    imgDelante.src = delanteURL;
    imgDelante.style.display = "block";
  }
  if (detrasURL) {
    imgDetras.src = detrasURL;
    imgDetras.style.display = "block";
  }
}
</script>

</body>
</html>
