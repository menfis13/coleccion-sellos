<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colección Filatélica · Isabel II</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --cream: #f5f0e8;
    --parchment: #ede5d0;
    --ink: #1a1208;
    --sepia: #5c3d1e;
    --gold: #b8860b;
    --gold-light: #d4a843;
    --rust: #8b3a2a;
    --sage: #4a5e4a;
    --shadow: rgba(26,18,8,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Crimson Pro', Georgia, serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1000; opacity: 0.6;
  }

  header { background: var(--ink); color: var(--cream); position: relative; overflow: hidden; }
  header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--sepia), var(--gold), var(--gold-light), var(--gold), var(--sepia)); }
  .header-inner { max-width: 1400px; margin: 0 auto; padding: 28px 32px 24px; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  .header-title h1 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--cream); }
  .header-title h1 span { color: var(--gold-light); font-style: italic; }
  .header-subtitle { font-size: 0.85rem; color: #a89070; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 4px; }
  .header-stats { display: flex; gap: 24px; align-items: center; }
  .stat-box { text-align: center; border: 1px solid rgba(184,134,11,0.3); padding: 8px 16px; border-radius: 2px; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold-light); display: block; }
  .stat-label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: #a89070; }
  .btn-add-header { background: var(--gold); color: var(--ink); border: none; padding: 10px 20px; font-family: 'Crimson Pro', serif; font-size: 1rem; font-weight: 600; cursor: pointer; border-radius: 2px; transition: background 0.2s; }
  .btn-add-header:hover { background: var(--gold-light); }

  .sync-bar { background: #1e2a1e; color: #7ab87a; padding: 8px 32px; font-size: 0.8rem; letter-spacing: 0.08em; display: flex; align-items: center; gap: 10px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #7ab87a; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .toolbar { background: var(--parchment); border-bottom: 1px solid rgba(92,61,30,0.2); padding: 14px 32px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; max-width: 1400px; margin: 0 auto; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 340px; }
  .search-wrap input { width: 100%; padding: 9px 14px 9px 36px; border: 1px solid rgba(92,61,30,0.3); background: var(--cream); font-family: 'Crimson Pro', serif; font-size: 1rem; color: var(--ink); border-radius: 2px; outline: none; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--sepia); font-size: 0.9rem; }
  .filter-select { padding: 9px 14px; border: 1px solid rgba(92,61,30,0.3); background: var(--cream); font-family: 'Crimson Pro', serif; font-size: 0.95rem; border-radius: 2px; cursor: pointer; }
  .view-toggle { display: flex; border: 1px solid rgba(92,61,30,0.3); border-radius: 2px; overflow: hidden; margin-left: auto; }
  .view-btn { padding: 9px 14px; background: var(--cream); border: none; cursor: pointer; color: var(--sepia); }
  .view-btn.active { background: var(--ink); color: var(--gold-light); }

  .main { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }
  .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }
  .grid-view.active { display: grid; }
  .list-view { display: none; }
  .list-view.active { display: block; }

  .stamp-card { background: white; border: 1px solid rgba(92,61,30,0.15); border-radius: 3px; overflow: hidden; cursor: pointer; transition: transform 0.2s; box-shadow: 0 2px 8px var(--shadow); position: relative; }
  .stamp-card:hover { transform: translateY(-3px); }
  .stamp-img-area { position: relative; background: #ffffff; min-height: 160px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .stamp-photo { width: 100%; height: 160px; object-fit: contain; display: block; }
  .stamp-info { padding: 12px 14px 14px; }
  .stamp-edifil { font-size: 0.7rem; color: var(--gold); font-weight: 600; margin-bottom: 2px; }
  .stamp-desc { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--ink); margin-bottom: 6px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,18,8,0.75); z-index: 500; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(2px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--cream); max-width: 780px; width: 100%; max-height: 90vh; overflow-y: auto; border-radius: 3px; border-top: 4px solid var(--gold); }
  .modal-header { padding: 24px 28px 16px; border-bottom: 1px solid rgba(92,61,30,0.15); display: flex; justify-content: space-between; }
  .modal-body { padding: 24px 28px; }

  .photo-section { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .photo-slot { border: 2px dashed rgba(92,61,30,0.25); border-radius: 3px; min-height: 180px; display: flex; flex-direction: column; background: #ffffff; position: relative; overflow: hidden; }
  .photo-slot-preview { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 110px; cursor: zoom-in; }
  .photo-slot-preview img { width: 100%; height: 100%; object-fit: contain; }
  .photo-actions { display: flex; border-top: 1px solid rgba(92,61,30,0.12); z-index: 3; }
  .photo-actions button { flex: 1; background: #faf7f2; color: var(--sepia); border: none; border-right: 1px solid rgba(92,61,30,0.12); padding: 7px 2px; font-size: 0.65rem; cursor: pointer; font-weight: 600; display: flex; flex-direction: column; align-items: center; }
  .photo-actions button:hover { background: var(--parchment); }
  .btn-quitar { color: #c0392b !important; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-input, .form-select, .form-textarea { padding: 9px 12px; border: 1px solid rgba(92,61,30,0.25); font-family: 'Crimson Pro', serif; font-size: 1rem; border-radius: 2px; }

  .modal-footer { padding: 16px 28px 24px; display: flex; justify-content: space-between; border-top: 1px solid rgba(92,61,30,0.1); }
  .btn { padding: 10px 22px; font-weight: 600; cursor: pointer; border-radius: 2px; border: none; }
  .btn-primary { background: var(--ink); color: var(--gold-light); }
  .btn-danger { background: none; color: var(--rust); border: 1px solid var(--rust); }

  /* LIGHTBOX */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(10,7,3,0.95); z-index: 900; align-items: center; justify-content: center; cursor: zoom-out; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; }

  /* AUTH */
  .auth-area { display: flex; align-items: center; gap: 12px; }
  .auth-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--gold); }
  .saving-toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: var(--gold-light); padding: 12px 20px; border-radius: 3px; z-index: 800; transform: translateY(100px); transition: 0.3s; }
  .saving-toast.show { transform: translateY(0); }

  /* CROP MODAL */
  #cropModal { display:none; position:fixed; inset:0; background:#0d0a06; z-index:9999; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:16px; }
  #cropModal.open { display:flex; }
  #cropBg { max-width:90vw; max-height:60vh; }
  #cropOverlay { position:absolute; top:0; left:0; cursor:crosshair; }

  @media (max-width: 640px) { .photo-section { grid-template-columns: 1fr; } .form-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">
      <div class="header-subtitle">Colección Filatélica Española</div>
      <h1>♛ <span>Isabel II</span></h1>
    </div>
    <div class="header-stats">
      <div class="stat-box"><span class="stat-num" id="stat-total">—</span><span class="stat-label">Total</span></div>
      <div class="stat-box"><span class="stat-num" id="stat-tengo">—</span><span class="stat-label">En colección</span></div>
    </div>
    <div class="auth-area" id="authArea"></div>
  </div>
</header>

<div id="syncBar" class="sync-bar">
  <div class="sync-dot"></div>
  <span id="syncMsg">Cargando colección...</span>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar..." oninput="renderStamps()">
  </div>
  <select class="filter-select" id="filterYear" onchange="renderStamps()"><option value="">Años</option></select>
  <div class="view-toggle">
    <button class="view-btn active" id="btnGrid" onclick="setView('grid')">⊞</button>
    <button class="view-btn" id="btnList" onclick="setView('list')">☰</button>
  </div>
</div>

<div class="main">
  <div class="grid-view active" id="gridView"></div>
  <div class="list-view" id="listView">
    <table style="width:100%; border-collapse: collapse; background:white;">
      <thead><tr style="background:var(--ink); color:var(--gold-light);">
        <th style="padding:12px;">Edifil</th><th>Año</th><th>Descripción</th><th>Estado</th>
      </tr></thead>
      <tbody id="listBody"></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div><div id="mEdifil" style="color:var(--gold); font-size:0.8rem;"></div><h2 id="mTitle"></h2></div>
      <button onclick="closeModal()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
    </div>
    <div class="modal-body">
      <div class="photo-section">
        <div class="photo-slot" id="slotReferencia">
          <div class="photo-slot-preview"><span class="photo-slot-icon">🏛️</span></div>
          <div style="text-align:center;font-size:0.6rem;background:#fdfaf2;padding:3px;">REFERENCIA</div>
          <div class="photo-actions edit-only">
            <button onclick="triggerPhotoCamera('referencia')">📷 Cámara</button>
            <button onclick="triggerPhotoGallery('referencia')">🖼️ Galería</button>
            <button class="btn-quitar" onclick="removePhoto('referencia')">🗑️</button>
          </div>
        </div>
        <div class="photo-slot" id="slotDelante">
          <div class="photo-slot-preview"><span class="photo-slot-icon">📷</span></div>
          <div style="text-align:center;font-size:0.6rem;background:#fdfaf2;padding:3px;">ANVERSO</div>
          <div class="photo-actions edit-only">
            <button onclick="triggerPhotoCamera('delante')">📷 Cámara</button>
            <button onclick="triggerPhotoGallery('delante')">🖼️ Galería</button>
            <button class="btn-quitar" onclick="removePhoto('delante')">🗑️</button>
          </div>
        </div>
        <div class="photo-slot" id="slotDetras">
          <div class="photo-slot-preview"><span class="photo-slot-icon">📷</span></div>
          <div style="text-align:center;font-size:0.6rem;background:#fdfaf2;padding:3px;">REVERSO</div>
          <div class="photo-actions edit-only">
            <button onclick="triggerPhotoCamera('detras')">📷 Cámara</button>
            <button onclick="triggerPhotoGallery('detras')">🖼️ Galería</button>
            <button class="btn-quitar" onclick="removePhoto('detras')">🗑️</button>
          </div>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group"><label>Edifil</label><input id="fEdifil" class="form-input" type="number"></div>
        <div class="form-group"><label>Año</label><input id="fAño" class="form-input" type="number"></div>
        <div class="form-group full"><label>Descripción</label><input id="fDesc" class="form-input" type="text"></div>
        <div class="form-group"><label>Estado</label>
          <select id="fEstado" class="form-select">
            <option value="">No tengo</option>
            <option value="Nuevo">Nuevo</option>
            <option value="Usado">Usado</option>
          </select>
        </div>
        <div class="form-group full"><label>Notas</label><textarea id="fNotas" class="form-textarea"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger edit-only" id="btnDelete" onclick="deleteStamp()">Eliminar</button>
      <div>
        <button class="btn" onclick="closeModal()">Cerrar</button>
        <button class="btn btn-primary edit-only" onclick="saveStamp()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="fileCamera" accept="image/*" capture="environment" onchange="handlePhoto(event)" style="display:none;">
<input type="file" id="fileGallery" accept="image/*" onchange="handlePhoto(event)" style="display:none;">

<div id="cropModal">
  <div style="color:white;">Recortar Imagen</div>
  <div style="position:relative;"><canvas id="cropBg"></canvas><canvas id="cropOverlay"></canvas></div>
  <div style="display:flex; gap:10px;">
    <button class="btn" onclick="closeCrop()">Cancelar</button>
    <button class="btn btn-primary" onclick="finishCrop()">Aceptar</button>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightboxImg" src="">
</div>

<div class="saving-toast" id="toast"></div>

<script>
// CONFIGURACIÓN
const SHEET_ID = '1KKTKamweQ0HQ85P9g8hy-CG4irFrJC_97_5qrEFmZ5E';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Hoja1`;
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzI2IsZKIM9yPSK6Ut9JJ0EMZVBXOQ_CXRhHYnmTAsQaCS-hcN3yT108Df3yEVZSE7i/exec';
const CLOUDINARY_CLOUD = 'do4ltpfbo';
const CLOUDINARY_PRESET = 'sellos_upload';
const AUTHORIZED_EMAIL = 'menfis13@gmail.com';
const GOOGLE_CLIENT_ID = '759568975578-srig0ulta1quiep6h3il89q5e2dhjvu8.apps.googleusercontent.com';

let stamps = [];
let currentStamp = null;
let currentUser = null;
let photoTarget = '';

// INICIO Y AUTH
window.onload = () => {
  const saved = localStorage.getItem('sellos_user');
  if(saved) { currentUser = JSON.parse(saved); applyAuthUI(); }
  google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleAuth });
  if(!currentUser) google.accounts.id.prompt();
  loadFromSheets();
};

function handleAuth(resp) {
  const payload = JSON.parse(atob(resp.credential.split('.')[1]));
  if(payload.email === AUTHORIZED_EMAIL) {
    currentUser = { name: payload.name, email: payload.email, picture: payload.picture };
    localStorage.setItem('sellos_user', JSON.stringify(currentUser));
    applyAuthUI();
  }
}

function applyAuthUI() {
  const area = document.getElementById('authArea');
  if(currentUser) {
    area.innerHTML = `<img class="auth-avatar" src="${currentUser.picture}"><button class="btn-add-header" onclick="openNew()">＋ Añadir</button>`;
    document.querySelectorAll('.edit-only').forEach(el => el.style.display = 'block');
  } else {
    area.innerHTML = `<button onclick="google.accounts.id.prompt()">Identificarse</button>`;
    document.querySelectorAll('.edit-only').forEach(el => el.style.display = 'none');
  }
}

// DATOS
async function loadFromSheets() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47, text.length - 2));
    stamps = json.table.rows.map(r => ({
      edifil: r.c[0]?.v || 0,
      año: r.c[1]?.v || 0,
      descripcion: r.c[2]?.v || '',
      estado: r.c[6]?.v || '',
      foto_referencia: r.c[10]?.v || '', // Nueva columna para referencia
      foto_delante: r.c[7]?.v || '',
      foto_detras: r.c[8]?.v || '',
      notas: r.c[9]?.v || ''
    }));
    renderStamps();
    updateStats();
    document.getElementById('syncMsg').textContent = 'Conectado';
  } catch(e) { console.error(e); }
}

function renderStamps() {
  const grid = document.getElementById('gridView');
  const query = document.getElementById('searchInput').value.toLowerCase();
  grid.innerHTML = '';
  stamps.filter(s => s.descripcion.toLowerCase().includes(query) || s.edifil.toString().includes(query)).forEach(s => {
    const card = document.createElement('div');
    card.className = 'stamp-card';
    card.onclick = () => openModal(s);
    const img = s.foto_delante || s.foto_referencia;
    card.innerHTML = `
      <div class="stamp-img-area">${img ? `<img src="${img}" class="stamp-photo">` : `#${s.edifil}`}</div>
      <div class="stamp-info"><div class="stamp-edifil">Edifil ${s.edifil}</div><div class="stamp-desc">${s.descripcion}</div></div>
    `;
    grid.appendChild(card);
  });
}

function updateStats() {
  document.getElementById('stat-total').textContent = stamps.length;
  document.getElementById('stat-tengo').textContent = stamps.filter(s => s.estado).length;
}

// MODAL Y FOTOS
function openModal(s) {
  currentStamp = s ? {...s} : { edifil:'', año:'', descripcion:'', estado:'', foto_referencia:'', foto_delante:'', foto_detras:'', notas:'' };
  document.getElementById('mEdifil').textContent = `Edifil ${currentStamp.edifil}`;
  document.getElementById('mTitle').textContent = currentStamp.descripcion || 'Nuevo Sello';
  document.getElementById('fEdifil').value = currentStamp.edifil;
  document.getElementById('fAño').value = currentStamp.año;
  document.getElementById('fDesc').value = currentStamp.descripcion;
  document.getElementById('fEstado').value = currentStamp.estado;
  document.getElementById('fNotas').value = currentStamp.notas;
  updatePhotoSlots();
  document.getElementById('modalOverlay').classList.add('open');
}

function updatePhotoSlots() {
  const map = { 'Referencia': currentStamp.foto_referencia, 'Delante': currentStamp.foto_delante, 'Detras': currentStamp.foto_detras };
  for(let key in map) {
    const slot = document.getElementById(`slot${key}`).querySelector('.photo-slot-preview');
    if(map[key]) slot.innerHTML = `<img src="${map[key]}" onclick="openLightbox('${map[key]}')">`;
    else slot.innerHTML = '📷';
  }
}

function triggerPhotoCamera(t) { photoTarget = t; document.getElementById('fileCamera').click(); }
function triggerPhotoGallery(t) { photoTarget = t; document.getElementById('fileGallery').click(); }

function handlePhoto(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => openCropModal(ev.target.result, blob => uploadCloudinary(blob));
  reader.readAsDataURL(file);
}

async function uploadCloudinary(blob) {
  showToast('Subiendo...');
  const fd = new FormData();
  fd.append('file', blob);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method:'POST', body:fd });
  const data = await res.json();
  if(photoTarget === 'referencia') currentStamp.foto_referencia = data.secure_url;
  if(photoTarget === 'delante') currentStamp.foto_delante = data.secure_url;
  if(photoTarget === 'detras') currentStamp.foto_detras = data.secure_url;
  updatePhotoSlots();
  showToast('Listo');
}

function removePhoto(t) {
  if(t === 'referencia') currentStamp.foto_referencia = '';
  if(t === 'delante') currentStamp.foto_delante = '';
  if(t === 'detras') currentStamp.foto_detras = '';
  updatePhotoSlots();
}

async function saveStamp() {
  showToast('Guardando...');
  currentStamp.edifil = document.getElementById('fEdifil').value;
  currentStamp.año = document.getElementById('fAño').value;
  currentStamp.descripcion = document.getElementById('fDesc').value;
  currentStamp.estado = document.getElementById('fEstado').value;
  currentStamp.notas = document.getElementById('fNotas').value;

  await fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({ action: 'save', stamp: currentStamp })
  });
  
  showToast('Sincronizando...');
  setTimeout(loadFromSheets, 1500);
  closeModal();
}

// UTILIDADES (Lightbox, Crop, Toast)
function openLightbox(url) { 
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function openNew() { openModal(null); }

// RECORTADOR (Lógica Simplificada)
let cropImg = new Image();
let cropCb = null;
function openCropModal(url, cb) {
  cropCb = cb;
  cropImg.onload = () => {
    const canvas = document.getElementById('cropBg');
    canvas.width = 300; canvas.height = 300;
    canvas.getContext('2d').drawImage(cropImg, 0, 0, 300, 300);
    document.getElementById('cropModal').classList.add('open');
  };
  cropImg.src = url;
}
function finishCrop() {
  const canvas = document.createElement('canvas');
  canvas.width = 400; canvas.height = 400;
  canvas.getContext('2d').drawImage(cropImg, 0, 0, 400, 400);
  canvas.toBlob(blob => { cropCb(blob); closeCrop(); });
}
function closeCrop() { document.getElementById('cropModal').classList.remove('open'); }

</script>
</body>
