<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sellos</title>

<style>
body{margin:0;font-family:Arial;background:#f5f0e8}
header{position:fixed;top:0;left:0;right:0;background:#111;color:#fff;padding:10px;z-index:100}
#grid{margin-top:70px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:10px}
.card{background:#fff;border:1px solid #ccc;padding:5px}
.card img{width:100%;height:140px;object-fit:contain}
</style>
</head>

<body>

<header>
<select id="epocaSelect"></select>
</header>

<div id="grid"></div>

<script>
const SHEET_ID = "1KKTKamweQ0HQ85P9g8hy-CG4irFrJC_97_5qrEFmZ5E";

async function cargarHoja(nombre){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(nombre)}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/setResponse\\((.*)\\)/s)[1]);

  const cols = json.table.cols.map(c=>c.label);
  const rows = json.table.rows.map(r=>{
    let obj={};
    cols.forEach((c,i)=> obj[c]=r.c[i]?.v || "");
    return obj;
  });

  return rows;
}

// 🔴 GENERADOR DE URL DE CLOUDINARY (CORRECTO)
function getImage(edifil){
  let clean = String(edifil).toUpperCase();

  let num = clean.match(/\d+/)?.[0] || "0";
  if (num.length < 3) num = num.padStart(3,'0');

  let sufijo = clean.match(/[A-Z]+/)?.[0] || "";

  return `https://res.cloudinary.com/do4ltpfbo/image/upload/sello_${num}${sufijo}.jpg`;
}

function render(data){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  data.forEach(s=>{
    const img = getImage(s.edifil);

    grid.innerHTML += `
      <div class="card">
        <img src="${img}" onerror="this.src='https://via.placeholder.com/150?text=No+Img'">
        <div><b>${s.edifil || ""}</b></div>
        <div>${s.descripcion || ""}</div>
        <div>${s.año || ""}</div>
      </div>
    `;
  });
}

async function init(){

  // 👉 AÑADE AQUÍ TODAS TUS HOJAS (incluye PRUEBAS si existe)
  const hojas = [
    "Hoja 1","Hoja 2","Hoja 3","Hoja 4","Hoja 5",
    "Hoja 6","Hoja 7","Hoja 8","Hoja 9","Hoja 10"
  ];

  const select = document.getElementById("epocaSelect");

  hojas.forEach(h=>{
    const opt=document.createElement("option");
    opt.value=h;
    opt.textContent=h;
    select.appendChild(opt);
  });

  select.onchange = async ()=>{
    const data = await cargarHoja(select.value);
    render(data);
  };

  // carga inicial
  const data = await cargarHoja(hojas[0]);
  render(data);
}

init();
</script>

</body>
</html>
