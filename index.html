<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colección Filatélica · Isabel II (Versión Corregida)</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root { --cream: #f5f0e8; --parchment: #ede5d0; --ink: #1a1208; --sepia: #5c3d1e; --gold: #b8860b; --gold-light: #d4a843; --shadow: rgba(26,18,8,0.15); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Crimson Pro', serif; background: var(--cream); color: var(--ink); min-height: 100vh; padding: 20px; }
  header { background: var(--ink); color: var(--cream); padding: 30px; border-radius: 5px; margin-bottom: 20px; text-align: center; border-bottom: 4px solid var(--gold); }
  h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; }
  h1 span { color: var(--gold-light); font-style: italic; }
  .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
  .stamp-card { background: white; border: 1px solid rgba(92,61,30,0.15); border-radius: 5px; overflow: hidden; box-shadow: 0 4px 12px var(--shadow); transition: 0.3s; }
  .stamp-card:hover { transform: translateY(-5px); }
  .stamp-img-area { height: 180px; display: flex; align-items: center; justify-content: center; background: #fff; padding: 10px; }
  .stamp-photo { max-width: 100%; max-height: 100%; object-fit: contain; }
  .stamp-info { padding: 15px; border-top: 1px solid #eee; text-align: center; }
  .stamp-edifil { color: var(--gold); font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
  .stamp-desc { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
</style>
</head>
<body>

<header>
  <div class="header-subtitle">MI COLECCIÓN PERSONAL</div>
  <h1>♛ <span>Isabel II</span></h1>
</header>

<div class="grid-view" id="gridView">
  </div>

<script>
// CONFIGURACIÓN DE TU CUENTA
const CLOUDINARY_CLOUD = 'do4ltpfbo';
// Ruta corregida a tu carpeta de Cloudinary
const BASE_URL = `https://res.cloudinary.com/${CLOUDINARY_CLOUD}/image/upload/sellos/imagenes/`;

// Listado de tus sellos (puedes añadir todos los que quieras)
const misSellos = [
  { edifil: 1, desc: "6 cuartos Negro" },
  { edifil: 2, desc: "12 cuartos Lila" },
  { edifil: 3, desc: "5 reales Rojo" },
  { edifil: 4, desc: "6 reales Azul" },
  { edifil: 6, desc: "6 cuartos Negro (1851)" },
  { edifil: 7, desc: "12 cuartos Violeta" }
];

function render() {
  const grid = document.getElementById('gridView');
  misSellos.forEach(s => {
    // Generamos el nombre: sello_001.jpg, sello_006.jpg...
    const fileName = `sello_${String(s.edifil).padStart(3, '0')}.jpg`;
    const fullUrl = BASE_URL + fileName;

    const card = document.createElement('div');
    card.className = 'stamp-card';
    card.innerHTML = `
      <div class="stamp-img-area">
        <img src="${fullUrl}" class="stamp-photo" 
             onerror="this.src='https://via.placeholder.com/150?text=Sello+${s.edifil}'">
      </div>
      <div class="stamp-info">
        <div class="stamp-edifil">EDIFIL ${s.edifil}</div>
        <div class="stamp-desc">${s.desc}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

window.onload = render;
</script>
</body>
</html>
