<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colección Filatélica · Isabel II</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* === TU CSS ORIGINAL SIN CAMBIOS === */
</style>
</head>
<body>

<!-- ================== INTERFAZ ORIGINAL ================== -->
<!-- (no se toca nada visual) -->


<input type="file" id="fileDelante" accept="image/*">
<input type="file" id="fileDetras" accept="image/*">

<script>
/* ================= CONFIG ================= */
const SCRIPT_URL = "PEGA_AQUI_TU_URL_DE_APPS_SCRIPT";

/* ================= SUBIDA DE IMÁGENES ================= */
function subirImagen(file, campo, filaEdifil) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => {
      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "uploadImage",
          edifil: filaEdifil,
          campo: campo,
          base64: reader.result
        })
      })
      .then(r => r.json())
      .then(d => resolve(d.url));
    };
    reader.readAsDataURL(file);
  });
}

/* ================= GUARDADO ================= */
async function guardarSello(datos, edifil) {
  if (datos.fileDelante) {
    datos.delante = await subirImagen(datos.fileDelante, "delante", edifil);
  }
  if (datos.fileDetras) {
    datos.detras = await subirImagen(datos.fileDetras, "detras", edifil);
  }

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "saveData",
      data: datos
    })
  });
}

/* ================= CARGA ================= */
function renderImagen(img, url) {
  if (url) {
    img.src = url;
    img.style.display = "block";
  }
}
</script>

</body>
</html>
