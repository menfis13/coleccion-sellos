<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo Sellos</title>

<style>
body{font-family:Arial;margin:20px;background:#f5f5f5}
.grid{display:grid;grid-template-columns:repeat(auto-fill,120px);gap:10px}
.sello{background:white;border:1px solid #ccc;padding:5px;text-align:center}
.sello img{width:100px;height:auto}
#editor{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:white;border:2px solid #333;padding:20px;display:none}
.photo{width:200px;border:1px solid #aaa;margin:10px}
</style>
</head>

<body>

<h2>Catálogo de Sellos</h2>

<div id="grid" class="grid"></div>

<div id="editor">
<h3 id="titulo"></h3>

<div>
<img id="imgFront" class="photo">
<br>
<input type="file" id="fileFront">
<button onclick="deleteImage('front')">Eliminar</button>
</div>

<div>
<img id="imgBack" class="photo">
<br>
<input type="file" id="fileBack">
<button onclick="deleteImage('back')">Eliminar</button>
</div>

<br>
<button onclick="closeEditor()">Cerrar</button>
</div>

<script>

const CLOUD_NAME="do4ltpfbo"
const BASE="https://res.cloudinary.com/"+CLOUD_NAME+"/image/upload/isabel2/"
const TOTAL_SELLOS=101

let current=null

function pad(n){
return n.toString().padStart(3,'0')
}

function imgURL(n){
return BASE+"sello_"+pad(n)+".jpg"
}

function createGrid(){

const grid=document.getElementById("grid")

for(let i=1;i<=TOTAL_SELLOS;i++){

const div=document.createElement("div")
div.className="sello"

const img=document.createElement("img")
img.src=imgURL(i)

img.onerror=function(){
this.style.opacity=0.2
}

div.appendChild(img)

div.onclick=function(){
openEditor(i)
}

grid.appendChild(div)

}

}

function openEditor(n){

current=n

document.getElementById("titulo").innerText="Sello "+pad(n)

document.getElementById("imgFront").src=imgURL(n)
document.getElementById("imgBack").src=imgURL(n)

document.getElementById("editor").style.display="block"

}

function closeEditor(){
document.getElementById("editor").style.display="none"
}

async function deleteImage(side){

if(!current) return

let publicId="isabel2/sello_"+pad(current)

try{

await fetch("https://api.cloudinary.com/v1_1/"+CLOUD_NAME+"/delete_by_token",{
method:"POST"
})

}catch(e){}

if(side==="front"){
document.getElementById("imgFront").src=""
}

if(side==="back"){
document.getElementById("imgBack").src=""
}

}

createGrid()

</script>

</body>
</html>
